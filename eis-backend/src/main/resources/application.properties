
# Server Configuration
server.port=8000
server.servlet.context-path=/api/v1

# Database Configuration - PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/eis_db
spring.datasource.username=eis_user
spring.datasource.password=eis_password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Redis Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379
# spring.cache.type=redis
# spring.cache.redis.time-to-live=600000

# Logging
logging.level.root=INFO
logging.level.ma.enset.eisbackend=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# Application
spring.application.name=EIS Backend
app.version=1.0.0
app.name=Employee Information System

# NVIDIA Cloud API
llm.provider=nvidia
nvidia.api.key=${NVIDIA_API_KEY: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}
nvidia.api.url=https://integrate.api.nvidia.com/v1
nvidia.model=meta/llama-3.1-8b-instruct

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Static Resources - serve uploaded files
spring.web.resources.static-locations=classpath:/static/,file:./uploads/
spring.mvc.static-path-pattern=/uploads/**

# Spring Mail Configuration
spring.mail.host=localhost
spring.mail.port=3025
spring.mail.username=test@company.com
spring.mail.password=password
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false